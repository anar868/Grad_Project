
model:
  name: lpsrgan
  load: /content/drive/MyDrive/Grad Project/models/lpsr-gan.pth
  args:
    num_blocks: 3
    dropout_prob: 0.5

model_ocr:
  name: GPLPR
  load: /content/drive/MyDrive/Grad Project/models/Rodosol.pth
  args:
    alphabet: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    nc: 3
    K: 7
    isSeqModel: True
    head: 2
    inner: 256
    isl2Norm: True

test_dataset:
  dataset:
    name: multi_image
    args:
      path_split: /content/split_all_example.txt
      phase: testing

  wrapper:
    name: SR_multi_image
    args:
      imgW: 48
      imgH: 16
      aug: False
      image_aspect_ratio: 3
      background: (127, 127, 127)
      in_images: 5
      test: True
  batch: 1
